# 개발용 — MySQL + Redis만 실행 (서버는 로컬에서 직접 빌드·실행)
# 사용: docker compose -f docker-compose.dev.yml up -d

services:
  mysql:
    image: mysql:8.0
    container_name: lemondory_mysql_dev
    environment:
      MYSQL_ROOT_PASSWORD: devroot
      MYSQL_DATABASE: lemondory_game
      MYSQL_USER: game_user
      MYSQL_PASSWORD: devpassword
    ports:
      - "13306:3306"
    volumes:
      - mysql_dev_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pdevroot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lemondory_dev

  redis:
    image: redis:7-alpine
    container_name: lemondory_redis_dev
    ports:
      - "16379:6379"
    volumes:
      - redis_dev_data:/data
    command: redis-server --appendonly yes
    networks:
      - lemondory_dev

networks:
  lemondory_dev:
    name: lemondory_dev

volumes:
  mysql_dev_data:
  redis_dev_data:
